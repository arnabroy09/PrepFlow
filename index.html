<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratchpads | PrepFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="streak-badge" id="streakBadge"><i class="fa-solid fa-fire"></i> <span></span></div>
        <div class="top-controls">
            <button class="icon-btn" onclick="toggleTheme()"><i class="fa-solid fa-moon" id="themeIcon"></i></button>
            <button class="icon-btn" onclick="openModal('settingsModal')"><i class="fa-solid fa-gear"></i></button>
        </div>
    </div>

    <header>
        <h1>Prep<span class="highlight">Flow</span></h1>
        <p>Your Professional Study OS & Workspace</p>
    </header>

    <div class="exam-container" id="examContainer"></div>

    <div class="tabs">
        <a href="index.html" class="tab-btn active"><i class="fa-solid fa-pen-nib"></i> Scratchpads</a>
        <a href="kanban.html" class="tab-btn"><i class="fa-solid fa-map"></i> Syllabus</a>
        <a href="resources.html" class="tab-btn"><i class="fa-solid fa-table"></i> Resources</a>
        <a href="tasks.html" class="tab-btn"><i class="fa-solid fa-list-check"></i> Tasks</a>
        <a href="flashcards.html" class="tab-btn"><i class="fa-solid fa-clone"></i> Flashcards</a>
        <a href="focus.html" class="tab-btn"><i class="fa-solid fa-chart-pie"></i> Focus</a>
    </div>

    <div class="page-content">
        <div class="section-header">
            <h3><i class="fa-solid fa-book-open"></i> My Scratchpads</h3>
            <div>
                <button class="btn-outline" onclick="addScratchpad()"><i class="fa-solid fa-plus"></i> New Note</button>
                <button class="btn-outline" onclick="exportNotesPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                <button class="btn-danger" onclick="eraseAll()"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;" id="scratchpadGrid"></div>
        <div id="pdfExportContainer" style="display: none; padding: 20px; background: white; color: black;"></div>
    </div>
</div>

<!-- Common Modals -->
<div class="modal-overlay" id="examModal"><div class="modal-content"><h3>Add Target Exam</h3><input type="text" id="newExamName" placeholder="Exam Name"><br><br><input type="date" id="newExamDate"><br><br><button class="btn-primary" onclick="saveNewExam()">Save</button> <button class="btn-outline" onclick="closeModals()">Cancel</button></div></div>
<div class="modal-overlay" id="settingsModal"><div class="modal-content"><h3>System Backup</h3><button class="btn-primary" style="width:100%; margin-bottom:10px;" onclick="exportWorkspace()">Download Backup</button><label for="importFile" class="btn-outline" style="display:flex; width:100%; justify-content:center; cursor:pointer;">Restore Backup</label><input type="file" id="importFile" accept=".json" style="display:none;" onchange="importWorkspace(event)"><br><br><button class="btn-outline" onclick="closeModals()">Close</button></div></div>

<script src="app.js"></script>
<script>
    let notesData = JSON.parse(localStorage.getItem('generalNotes')) || [{ id: Date.now(), title: "Note 1", content: "" }];
    if(!Array.isArray(notesData)) notesData = [{ id: Date.now(), title: "Quick Note", content: localStorage.getItem('generalNotes') || "" }];
    
    function saveNotes() { localStorage.setItem('generalNotes', JSON.stringify(notesData)); }
    function renderNotes() {
        const grid = document.getElementById('scratchpadGrid'); grid.innerHTML = '';
        notesData.forEach((note, i) => {
            grid.innerHTML += `<div style="background:var(--surface); padding:15px; border-radius:var(--radius-md); border:1px solid var(--border);">
                <input type="text" value="${note.title}" onchange="updateNote(${i}, 'title', this.value)" style="font-weight:bold; border:none; background:transparent; padding:5px; margin-bottom:10px;">
                <textarea onchange="updateNote(${i}, 'content', this.value)" style="height:150px; border:none; background:transparent; padding:5px; resize:vertical;" placeholder="Start typing...">${note.content}</textarea>
                <div style="display:flex; justify-content:space-between; margin-top:10px; border-top:1px solid var(--border); padding-top:10px;">
                    <button style="background:none; color:var(--text-muted);" onclick="copyNote(${i})"><i class="fa-solid fa-copy"></i> Copy</button>
                    <button style="background:none; color:var(--danger);" onclick="deleteNote(${i})"><i class="fa-solid fa-trash"></i> Delete</button>
                </div>
            </div>`;
        });
    }
    function addScratchpad() { notesData.push({ id: Date.now(), title: `Note ${notesData.length+1}`, content: "" }); saveNotes(); renderNotes(); }
    function updateNote(index, field, value) { notesData[index][field] = value; saveNotes(); }
    function deleteNote(index) { notesData.splice(index, 1); saveNotes(); renderNotes(); }
    function copyNote(index) { navigator.clipboard.writeText(notesData[index].content); alert("Copied!"); }
    function eraseAll() { if(confirm("Erase all notes?")) { notesData=[]; saveNotes(); renderNotes(); } }
    
    function exportNotesPDF() {
        const container = document.getElementById('pdfExportContainer'); container.innerHTML = '<h1>PrepFlow Notes</h1><hr>';
        notesData.forEach(n => { container.innerHTML += `<h2>${n.title}</h2><p style="white-space:pre-wrap;">${n.content}</p><br><hr><br>`; });
        container.style.display = 'block'; html2pdf().from(container).save('PrepFlow_Notes.pdf').then(() => container.style.display = 'none');
    }
    renderNotes();
</script>
</body>
</html>
